<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rock Camp Vega 2026 · Galería</title>
<meta name="description" content="Galería de fotos del Rock Camp Vega 2026.">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Work+Sans:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <img class="logo" src="logos/logo_rockcamp_superhorizontal.svg" alt="Rock Camp Vega 2026">
    <div class="header-text">
      <h1 class="title">ROCK CAMP VEGA <span class="title-year">2026</span></h1>
      <p class="subtitle">Galería de fotos del campamento</p>
    </div>
  </div>
</header>

<main class="stage">

  <div id="state-loading" class="state-message" role="status">
    <span class="state-icon">♪</span>
    <p>Afinando guitarras y cargando la galería…</p>
  </div>

  <div id="state-empty" class="state-message" hidden>
    <span class="state-icon">☆</span>
    <p>Aún no hay fotos en el escenario.</p>
    <p class="state-sub">Vuelve pronto, esto se llena rápido.</p>
  </div>

  <div id="state-error" class="state-message" hidden>
    <span class="state-icon">!</span>
    <p>No hemos podido cargar la galería.</p>
    <p class="state-sub" id="error-detail">Comprueba tu conexión o la configuración del repositorio.</p>
  </div>

  <section id="gallery" class="gallery" aria-label="Galería de fotos"></section>

</main>

<footer class="site-footer">
  <p>Rock Camp Vega 2026</p>
</footer>

<!-- Lightbox -->
<div id="lightbox" class="lightbox" hidden>
  <button id="lightbox-close" class="lightbox-close" aria-label="Cerrar foto">✕</button>
  <button id="lightbox-prev" class="lightbox-nav lightbox-prev" aria-label="Foto anterior">‹</button>
  <button id="lightbox-next" class="lightbox-nav lightbox-next" aria-label="Foto siguiente">›</button>
  <figure class="lightbox-figure">
    <img id="lightbox-img" src="" alt="">
    <figcaption id="lightbox-caption"></figcaption>
  </figure>
</div>

<script src="script.js"></script>
</body>
</html>
